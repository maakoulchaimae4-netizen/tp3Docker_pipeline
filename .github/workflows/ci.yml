name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Installer Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Installer dépendances
      run: pip install -r requirements.txt

    - name: Lancer les tests
      run: pytest